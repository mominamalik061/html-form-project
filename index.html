
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Survey Form</title>
	<link rel="stylesheet" type="text/css" href="project2.css">
</head>
<body>
	<main>
		<header>
			<h1 id="title">Survey Form</h1>
			<p id="description">
				ThnakYOU For Taking Your Time For FeedBack
			</p>
		</header>
		<!-- form -->
		<form id="survey-form">
			<div class="form-group">
				<label for="name">NAME:</label>
				<input type="name" id="name" name="name" placeholder= EnterYourName>
			</div><br>
			<div class="form-group">
				<label for="email">EMAIL:</label>
				<input type="email" id="email" name="email" placeholder=EnterYourEmail>
			</div><br>
			<div class="form-group">
				<label for="number">AGE:</label>
				<input type="number" id="number" name="age" placeholder=EnterYourAge>
			</div>
			<div class="form-group">
				<label>
					Choose A Role Thats Best Describes You:
				</label>
				<select name="occupation" id="dropdown">
					<option selected disabled>Select Your Role</option>
					<option value="student">Student</option>
					<option value="full-time-job">Full Time Job</option>
					<option value="part-time-job">Part Time Job</option>
					<option value="prefer-not-to-say">Prefer Not To Say</option>
					<option value="other">Other</option>
					<!-- yaha par jo value lagai gai hai wo backaned ky lye hai waisy b same waisy hi work karta hai jaisy us ky bagair -->
				</select>
			</div>
			<div class="form-group">
				<label>
					Would You Recommand Our Product To Friend?
				</label>
					<div class="radio-group">
					<input type="radio" name="rating" id="never">
					<label>Never</label>
			        </div>
					<div class="radio-group">
						<input type="radio" name="rating" id="maybe">
						<label>Maybe</label>
					</div>
					<div class="radio-group">
						<input type="radio" name="rating" id="likely">
						<label>Likely</label>
					</div>
					<div class="radio-group">
						<input type="radio" name="rating" id="definitely">
						<label>Definitely</label>
			</div>
			<div class="form-group">
				<label>
					Select Thing That Liked Our Product:
				</label>
					<div class="checkbox-group">
					<input type="checkbox" name="liked" id="ui">
					<label>UI</label>
			        </div>
					<div class="checkbox-group">
						<input type="checkbox" name="liked" id="features">
						<label>Features</label>
					</div>
					<div class="checkbox-group">
						<input type="checkbox" name="liked" id="service">
						<label>Service</label>
					</div>
					<div class="checkbox-group">
						<input type="checkbox" name="rating" id="Simpleness">
						<label>Simpleness</label>
			</div>
			<div class="form-group">
				<label>Remarks:</label>
				 <textarea name="remarks" id="remarks" placeholder="Tell Us How Can We Improve Us...."></textarea>
			</div>
			<div class="form-group">
				<button id="submit" type="submit">Submit</button>
			</div>

		</form>
	</main>
	<style>
		body{
	margin:40px 0 40px 0;
	padding: 0;
	outline: none;
	border: none;
	background-color: #e35267;
	box-shadow: none;
	font-family:monospace;
}
main{
    background-color: white;
    padding:10px 40px 40px 40px;
    display: block;
    text-align: left;
    max-width: 500px;
    margin:auto;
    border-radius: 10px;
}
header{
	text-align:center;
}
h1{
	font-size: 40px;
	color: #191615;
	font-weight: bold;
}
form{
	display:flex;
	flex-direction:column;
	font-size:22px;
}
#name,#email,#number,#dropdown{
	outline:none;
	width:100%;
	padding: 7px;
	font-size: 16px;
	border: 1px solid #dee2ed;
	border-radius: 3px;
	background-color: white;
	box-sizing: border-box;
}
#dropdown,option{
	outline:none;
}
select{
	padding:7px;
}
textarea{
	display:block;
}
.form-group{
	padding:8px 0;
	margin-bottom: 2px;
}
.form-group>label{
    margin-bottom:8px;
    color:#191615;
    display:block;
    font-weight: 500;
}
[type="checkbox"]+label{
	margin:0 8px 0 0;
	box-sizing:border-box;
	min-width:18px;
	min-height:18px;
}
[type="checkbox"],[type="radio"]{
	opacity: 1;
}
textarea{
	width:100%;
	box-sizing: border-box;
	height: 200px;
	resize: none;
	padding:4px;
	font-size: 16px;
	border:1px solid #dee2ed;
}
#description{
	text-align: center;
	font-size: italic;
	margin-top: -10px;
}
button{
	width:100%;
	display:block;
	background-color: #191615;
	color:white;
	border:none;
	font-size: 20px;
	font-weight: bold;
	box-sizing: border-box;
}

	</style>

</body>
</html>
